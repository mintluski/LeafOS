set timeout=3
set default=0

# Serial console for QEMU -nographic
serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial

menuentry "LeafOS v1.0-LTS" {
    linux /boot/LeafOS/vmlinuz console=tty0 console=ttyS0,115200 rdinit=/init quiet loglevel=3
    initrd /boot/LeafOS/initramfs.gz
}

menuentry "LeafOS v1.0-LTS (Recovery)" {
    linux /boot/LeafOS/vmlinuz console=tty0 console=ttyS0,115200 rdinit=/init
    initrd /boot/LeafOS/initramfs.gz
}

menuentry "LeafOS v1.0-LTS (Rescue Shell)" {
    linux /boot/LeafOS/vmlinuz console=tty0 console=ttyS0,115200 rdinit=/bin/sh
    initrd /boot/LeafOS/initramfs.gz
}

menuentry "Install LeafOS to disk" {
    linux /boot/LeafOS/vmlinuz console=tty0 console=ttyS0,115200 rdinit=/installer.sh quiet loglevel=3
    initrd /boot/LeafOS/initramfs.gz
}
